version: 1
disable_existing_logger: False
formatters:
  default:
    "()": "uvicorn.logging.DefaultFormatter"
    fmt: "%(asctime)s [%(process)d|%(thread)d] %(levelprefix)s %(message)s"
    use_colors:
    datefmt: "%Y-%m-%d %H:%M%z"
  access:
    "()": "uvicorn.logging.AccessFormatter"
    fmt: '%(asctime)s [%(process)d|%(thread)d] %(levelprefix)s %(client_addr)s - "%(request_line)s" %(status_code)s'
    datefmt: "%Y-%m-%d %H:%M%z"
handlers:
  default:
    formatter: default
    class: logging.StreamHandler
    stream: ext://sys.stderr
  access:
    formatter: access
    class: logging.StreamHandler
    stream: ext://sys.stdout
loggers:
  uvicorn:
    handlers:
      - default
    level: INFO
    propagate: False
  uvicorn.error:
    level: INFO
  uvicorn.access:
    handlers":
      - access
    level": INFO
    propagate: False
  api:
    handlers":
      - default
    level": INFO
    propagate: False
  sqlalchemy.engine.Engine:
    handlers:
      - default
    level: INFO
    propagate: False
  # This is the default pool implementation used by sqlalchemy
  # if we change from to other implementation we have to switch
  # to the correct name
  sqlalchemy.pool.impl.QueuePool:
    handlers:
      - default
    level: INFO
    propagate: False
