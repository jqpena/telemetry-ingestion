services:
    db:
        image: "postgres:18-alpine"
        restart: always
        user: postgres
        secrets:
            - db-password
        volumes:
            - db-data:/var/lib/postgresql/data
        environment:
            - POSTGRES_PASSWORD_FILE=/run/secrets/db-password
        expose:
            - 5432
        healthcheck:
            test: [ "CMD", "pg_isready" ]
            interval: 10s
            timeout: 5s
            retries: 5
    server:
        build:
            context: .
        ports:
            - 8000:8000
        env_file:
            - .prod.env
        healthcheck:
            test: [ "CMD", "curl", "http://localhost:8000/health" ]
            interval: 1m30s
            timeout: 30s
            retries: 5
            start_period: 30s
        # The commented out section below is an example of how to define a PostgreSQL
        # database that your application can use. `depends_on` tells Docker Compose to
        # start the database before your application.
        depends_on:
            db:
                condition: service_healthy
volumes:
    db-data:
secrets:
    db-password:
        file: db/password.txt
